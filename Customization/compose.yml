services:
  db:
    #build:
    build: ./postgres
    image: my-postgres18-pgvector:latest
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - elsaka_db_data:/var/lib/postgresql
    restart: unless-stopped

  odoo:
    image: odoo:19.0
    depends_on:
      - db
    ports:
      - "9090:8069"
    volumes:
      - elsaka_odoo_data:/var/lib/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./custom_addons:/mnt/extra-addons:ro
      - ./enterprise:/mnt/enterprise:ro
    restart: unless-stopped

volumes:
  elsaka_db_data:
  elsaka_odoo_data:
