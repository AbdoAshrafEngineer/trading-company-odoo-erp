[options]
; DB connection (service name "db" is your hostname inside docker network)
db_host = db
db_port = 5432
db_user = odoo
db_password = 123

xmlrpc_interface = 0.0.0.0

; IMPORTANT: tell Odoo where addons live
; - first path is built-in community addons inside the image
; - then your custom addons
; - then enterprise addons
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/enterprise

; Security: set a strong master password
admin_passwd = 1

; Good when running behind a reverse proxy later (nginx/traefik)
proxy_mode = True

; Optional: reduce noise
log_level = info
